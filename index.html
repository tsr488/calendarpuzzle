<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Calendar Puzzle Solver</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <h1>📅 Calendar Puzzle</h1>
  <p class="subtitle">Daily polyomino challenge solver</p>

  <div class="controls">
    <select id="month-select" aria-label="Month"></select>
    <select id="day-select" aria-label="Day"></select>
    <button id="today-btn" class="btn-secondary">Today</button>
    <button id="solve-btn">Solve</button>
  </div>

  <canvas id="puzzle-canvas"></canvas>

  <div id="status"></div>

  <div id="legend" class="legend"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
