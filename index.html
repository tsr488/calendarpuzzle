<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Calendar Puzzle Solver</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="top-bar">
    <span id="version-label" class="version-label"></span>
    <h1>Tom and Ryann 📅 Puzzle</h1>
    <button id="debug-toggle-btn" class="debug-toggle-btn">Debug</button>
  </div>

  <div class="date-toggle">
    <button id="date-today" class="date-btn active">Today</button>
    <button id="date-tomorrow" class="date-btn">Tomorrow</button>
    <span id="date-label" class="date-label"></span>
  </div>

  <div class="camera-section">
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="photo-canvas" class="hidden"></canvas>
    <div class="camera-controls">
      <button id="camera-start-btn">📷 Start Camera</button>
      <button id="camera-capture-btn" disabled>Capture</button>
      <button id="hint-btn" class="btn-secondary hidden">💡 Hint</button>
    </div>
  </div>

  <div id="status"></div>

  <!-- Debug view (hidden by default, toggle with Debug button) -->
  <div id="debug-section" class="hidden">
    <canvas id="debug-canvas"></canvas>
  </div>

  <script src="https://docs.opencv.org/4.10.0/opencv.js" async></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
